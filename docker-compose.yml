services:
  db:
    image: mysql:8.0
    container_name: petfinder_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: petfinder
      MYSQL_USER: petfinder_user
      MYSQL_PASSWORD: petfinder_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile_backend
    container_name: petfinder_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://petfinder_user:petfinder_pass@db:3306/petfinder
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile_frontend
    volumes:
      - ./frontend:/app
    container_name: petfinder_frontend
    restart: on-failure
    ports:
      - "5173:5173"
      - "24678:24678"
      - "15000:15000"
    depends_on:
      - backend
volumes:
  db_data:
