services:
  db:
    image: mysql:8.0
    container_name: petfinder_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: petfinder
      MYSQL_USER: petfinder_user
      MYSQL_PASSWORD: petfinder_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
  backend:
    build: ./backend
    container_name: petfinder_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      SENDGRID_API_KEY: TU_API_KEY_AQUI
      EMAIL_REMITENTE: TU_EMAIL_AQUI
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads
  frontend:
    build: ./frontend
    container_name: petfinder_frontend
    restart: on-failure
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  db_data: